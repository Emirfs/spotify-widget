<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify Widget</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Lyrics Panel (sits above widget-container in flex layout) -->
  <div class="lyrics-panel" id="lyricsPanel">
    <div class="lyrics-title" id="lyricsTitle">Lyrics</div>
    <div class="lyrics-content" id="lyricsContent">Lyrics will appear here...</div>
  </div>

  <div class="widget-container" id="widgetContainer">
    <!-- Visual Scale Feedback Overlay -->
    <div class="scale-indicator" id="scaleIndicator">100%</div>

    <!-- Lyrics Toggle Button -->
    <button class="lyrics-btn" id="lyricsBtn" title="Toggle Lyrics">
      <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
      </svg>
    </button>

    <!-- Theme Toggle Button -->
    <button class="theme-btn" id="themeBtn" title="Toggle Theme">
      <!-- Sun Icon (visible in dark theme) -->
      <svg class="sun-icon" viewBox="0 0 24 24" width="12" height="12" fill="currentColor">
        <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 0 0-1.41 0 .996.996 0 0 0 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 0 0-1.41 0 .996.996 0 0 0 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96a.996.996 0 0 0 0-1.41.996.996 0 0 0-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.01a.996.996 0 0 0 0-1.41.996.996 0 0 0-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>
      </svg>
      <!-- Moon Icon (visible in light theme) -->
      <svg class="moon-icon" viewBox="0 0 24 24" width="12" height="12" fill="currentColor">
        <path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/>
      </svg>
    </button>

    <!-- Close Button -->
    <button class="close-btn" id="closeBtn" title="Close widget">&times;</button>

    <!-- Album Art Section -->
    <div class="album-art-container">
      <div class="cover-wrapper" id="coverWrapper">
        <!-- Dynamic Image -->
        <img id="albumArt" class="album-art-img" src="" alt="Album Art">
        
        <!-- Fallback Placeholder -->
        <div class="cover-placeholder" id="coverPlaceholder">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v-.07zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
          </svg>
        </div>

        <!-- Play/Pause Overlay in Mini-Mode -->
        <div class="cover-overlay" id="coverOverlay" title="Play/Pause">
          <svg class="mini-play-icon" viewBox="0 0 24 24" width="12" height="12" fill="currentColor">
            <path d="M8 5v14l11-7z"/>
          </svg>
          <svg class="mini-pause-icon hidden" viewBox="0 0 24 24" width="12" height="12" fill="currentColor">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- Song Info -->
    <div class="song-info">
      <div class="title-container">
        <span class="title" id="songTitle">Loading...</span>
      </div>
      <div class="artist-container">
        <span class="artist" id="songArtist">Please open Spotify</span>
      </div>
    </div>

    <!-- Media Controls -->
    <div class="controls">
      <button class="control-btn" id="prevBtn" title="Previous">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <path d="M6 6h2v12H6zm3.5 6L18 6v12z"/>
        </svg>
      </button>
      <button class="control-btn play-pause-btn" id="playPauseBtn" title="Play/Pause">
        <!-- Play Icon -->
        <svg id="playIcon" viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
          <path d="M8 5v14l11-7z"/>
        </svg>
        <!-- Pause Icon -->
        <svg id="pauseIcon" class="hidden" viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
        </svg>
      </button>
      <button class="control-btn" id="nextBtn" title="Next">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <path d="M6 18l8.5-6L6 6zm10-12h2v12h-2z"/>
        </svg>
      </button>
    </div>

    <!-- Song Progress Bar (bottom-aligned thin stripe) -->
    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <!-- Time display indicator (bottom-right edge) -->
    <div class="time-display" id="timeDisplay">0:00 / 0:00</div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
