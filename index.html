<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify Widget</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Drag area for moving the widget -->
  <div class="widget-container">
    <!-- Close button -->
    <button class="close-btn" id="closeBtn" title="Close widget">&times;</button>

    <!-- Vinyl Album Art -->
    <div class="album-art-container">
      <div class="vinyl" id="vinyl">
        <div class="vinyl-center">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
            <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424c-.18.295-.565.387-.86.207-2.377-1.454-5.37-1.783-8.893-.98-.336.075-.67-.14-.744-.475-.075-.336.14-.67.476-.745 3.857-.88 7.15-.506 9.813 1.127.295.18.387.564.208.86zm1.224-2.72c-.226.367-.707.487-1.074.26-2.72-1.672-6.87-2.157-10.082-1.182-.413.125-.847-.107-.972-.52-.125-.413.107-.847.52-.972 3.673-1.114 8.243-.57 11.348 1.34.367.227.487.708.26 1.074zm.106-2.833C14.384 8.71 8.567 8.518 5.18 9.546c-.53.16-1.09-.14-1.25-.67-.16-.53.14-1.09.67-1.25 3.882-1.178 10.31-.955 14.417 1.482.478.283.634.897.35 1.376-.282.48-.897.635-1.376.35z"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- Song Info -->
    <div class="song-info">
      <div class="title-container">
        <span class="title" id="songTitle">Loading...</span>
      </div>
      <div class="artist-container">
        <span class="artist" id="songArtist">Please open Spotify</span>
      </div>
    </div>

    <!-- Media Controls -->
    <div class="controls">
      <button class="control-btn" id="prevBtn" title="Previous">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <path d="M6 6h2v12H6zm3.5 6L18 6v12z"/>
        </svg>
      </button>
      <button class="control-btn play-pause-btn" id="playPauseBtn" title="Play/Pause">
        <!-- Play Icon -->
        <svg id="playIcon" viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
          <path d="M8 5v14l11-7z"/>
        </svg>
        <!-- Pause Icon -->
        <svg id="pauseIcon" class="hidden" viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
        </svg>
      </button>
      <button class="control-btn" id="nextBtn" title="Next">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <path d="M6 18l8.5-6L6 6zm10-12h2v12h-2z"/>
        </svg>
      </button>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
